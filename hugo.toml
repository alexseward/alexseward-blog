baseURL = 'https://alexseward.com/'
languageCode = 'en-gb'
title = "93 'til Infinity"
paginate = 10
enableRobotsTXT = true

[params]
  description = "93 'til Infinity is a personal site by Alex Seward about technology, music, culture, sport, and whatever else stays interesting long enough to matter."
  author = 'Alex Seward'
  defaultTheme = 'auto'

  [params.assets]
    favicon = '/favicon.ico'

  [params.home]
    eyebrow = 'Personal essays and observations'
    intro = "93 'til Infinity is my corner of the internet for writing about technology, music, culture, football, creativity, and the small ideas that keep hanging around."
    note = "The name comes from the Souls of Mischief track. It feels more like the spirit of the site than a job title ever could."

  [[params.socialLinks]]
    name = 'GitHub'
    url = 'https://github.com/alexseward'

  [[params.socialLinks]]
    name = 'LinkedIn'
    url = 'https://linkedin.com/in/alexseward'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    style = 'dracula'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 5

  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 10

  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 30
