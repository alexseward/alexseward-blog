baseURL = 'https://alexseward.com/'
locale = 'en-gb'
title = "93 'til Infinity"
pagination.pagerSize = 10
enableRobotsTXT = true

[params]
  description = "93 'til Infinity is a personal site by Alex Seward about technology, music, culture, sport, and whatever else stays interesting long enough to matter."
  author = 'Alex Seward'
  defaultTheme = 'auto'

  [params.assets]
    favicon = '/favicon.svg'

  [params.home]
    eyebrow = 'Personal essays and observations'
    headline = 'Essays & observations on technology, culture, music, sport and the internet.'
    intro = 'Written by Alex Seward in Bristol.'

  [[params.socialLinks]]
    name = 'GitHub'
    url = 'https://github.com/alexseward'

  [[params.socialLinks]]
    name = 'LinkedIn'
    url = 'https://linkedin.com/in/alexseward'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    style = 'dracula'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10

  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20

  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 30
